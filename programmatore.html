<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il Programmatore Tipico™ - v0.9.2-HOTFIX</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --green:  #39ff14;
    --red:    #ff2d55;
    --yellow: #ffe600;
    --orange: #ff8c00;
    --blue:   #00cfff;
    --purple: #c77dff;
    --bg:     #0a0a0f;
    --panel:  #0f0f1a;
    --border: #2a2a4a;
    --text:   #c8c8e0;
    --dim:    #666699;

    --font-s: 11px;
    --font-m: 16px;
    --font-l: 20px;
    --font-x: 48px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Share Tech Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    cursor: crosshair;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(57,255,20,0.015);
    pointer-events: none;
    z-index: 9998;
    animation: flicker 8s infinite;
  }

  @keyframes flicker {
    0%,100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.7; }
    94% { opacity: 1; }
    96% { opacity: 0.85; }
    97% { opacity: 1; }
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 16px;
    background: var(--panel);
    border-bottom: 2px solid var(--border);
    height: 64px;
    gap: 20px;
  }

  .topbar-title {
    font-family: 'VT323', monospace;
    font-size: var(--font-l);
    color: var(--green);
    text-shadow: 0 0 8px var(--green);
    white-space: nowrap;
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  .topbar-title span {
    color: var(--dim);
    font-size: var(--font-m);
  }

  .bars-area {
    display: flex;
    gap: 20px;
    flex: 1;
    justify-content: flex-end;
  }

  .bar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    max-width: 280px;
  }

  .bar label {
    font-family: 'VT323', monospace;
    font-size: var(--font-l);
    white-space: nowrap;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    flex-shrink: 0;
    min-width: 90px;
    text-align: right;
  }

  .bar label.stress-label   { color: #ff2d55cc; }
  .bar label.quality-label  { color: #39ff1499; }
  .bar label.charge-label   { color: #00cfffcc; }

  .progress-wrap {
    flex: 1;
    position: relative;
  }

  .progress {
    height: 18px;
    background: #0a0a12;
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }

  .fill {
    height: 100%;
    width: 50%;
    transition: width 0.25s, background 0.5s;
    position: relative;
  }

  .fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: rgba(255,255,255,0.6);
    filter: blur(2px);
  }

  .bar-value {
    font-family: 'VT323', monospace;
    font-size: var(--font-l);
    width: 34px;
    text-align: right;
    color: var(--dim);
    flex-shrink: 0;
  }

  .container {
    display: grid;
    grid-template-columns: 320px 1fr 320px;
    height: calc(100vh - 64px - 60px);
  }

  .panel {
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel.right {
    border-right: none;
    border-left: 1px solid var(--border);
  }

  .panel-header {
    padding: 8px 12px;
    background: #14142a;
    border-bottom: 1px solid var(--border);
    font-family: 'VT323', monospace;
    font-size: var(--font-l);
    letter-spacing: 2px;
    color: var(--blue);
    text-shadow: 0 0 6px var(--blue);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-header .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--blue);
    box-shadow: 0 0 6px var(--blue);
    animation: blink 1.2s infinite;
  }

  .panel-header.events-header { color: var(--red); text-shadow: 0 0 6px var(--red); }
  .panel-header.events-header .dot { background: var(--red); box-shadow: 0 0 6px var(--red); animation-delay: 0.6s; }

  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .panel-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  /* ── CARD BANNER IMAGE ── */
  .card-banner-wrap {
    position: relative;
    overflow: hidden;
    height: auto;
    background: #0a0a18;
    border-bottom: 1px solid var(--border);
  }

  .card-banner-wrap img {
    width: 100%;
    height: 100%;
	max-height: 150px;
    object-fit: cover;
    display: block;
    transition: opacity 0.3s;
  }

  /* Gradient overlay dal basso: sfuma il banner nel colore della card */
  .card-banner-wrap::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 40px;
    background: linear-gradient(transparent 50%, #002 100%);
    z-index: 3;
    pointer-events: none;
  }

  /* Fallback placeholder quando non c'è l'immagine o è in errore */
  .card-banner-placeholder {
    width: 100%;
    height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    background: linear-gradient(135deg, #0d0d20 0%, #12121f 100%);
    border-bottom: 1px solid var(--border);
    letter-spacing: 4px;
    opacity: 0.5;
    font-family: 'VT323', monospace;
    color: var(--dim);
    font-size: var(--font-m);
    letter-spacing: 3px;
  }

  /* bonus event: tinta verde sul banner */
  .event.bonus .card-banner-wrap::before {
    background: linear-gradient(transparent 50%, #020 100%);
  }
  
  .task {
    background: #12121f;
    border: 1px solid var(--border);
    border-left: 3px solid var(--blue);
	margin-bottom: 8px;
    cursor: pointer;
    border-radius: 2px;
    transition: border-color 0.2s, background 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .task-body {
    padding: 8px 10px;
    position: relative;
  }

  .task::before {
    content: '▶ CLICK';
    position: absolute;
    right: 8px; 
	top: 8px;
    font-size: var(--font-m);
    color: var(--green);
    opacity: 0;
    transition: opacity 0.15s;
    font-family: 'VT323', monospace;
    letter-spacing: 1px;
	background: rgba(0, 0, 0, 0.5);
    padding: 2px 4px;
    z-index: 10;
  }

  .task:hover {
    background: #1a1a30;
    border-left-color: var(--green);
    transform: scale(1.02);
  }

  .task:hover::before { opacity: 1; }

  .task.urgent {
    border-left-color: var(--red) !important;
    background: #1f0a0a !important;
    animation: urgentPulse 0.6s infinite;
  }

  .task.urgent .card-banner-wrap::before {
    background: linear-gradient(transparent 50%, #200 100%);
  }

  @keyframes urgentPulse {
    0%,100% { border-left-color: var(--red); }
    50% { border-left-color: #660000; }
  }

  .task-name {
    font-family: 'VT323', monospace;
    font-size: var(--font-m);
    color: var(--text);
    margin-bottom: 4px;
    padding-right: 50px;
  }

  .task-meta {
    font-size: var(--font-s);
    color: var(--blue);
    display: flex;
    justify-content: space-between;
  }

  .task-meta .ttl       { color: var(--yellow); }
  .task-meta .ttl.low   { color: var(--red); }

  .ttl-bar {
    height: 2px;
    background: var(--border);
    margin-top: 6px;
    border-radius: 1px;
    overflow: hidden;
  }

  .ttl-fill {
    height: 100%;
    background: var(--green);
    transition: width 0.25s, background 0.25s;
  }

  .event {
    background: #1a0a0f;
    border: 1px solid #2a0a14;
    border-left: 3px solid var(--red);
    margin-bottom: 8px;
    border-radius: 2px;
    overflow: hidden;
  }

  .event-body {
    padding: 8px 10px;
  }

  .event-name {
    font-family: 'VT323', monospace;
    font-size: var(--font-m);
    color: var(--text);
    margin-bottom: 4px;
  }

  .event-meta {
    font-size: var(--font-s);
    color: var(--dim);
    display: flex;
    gap: 14px;
    justify-content: space-between;
  }

  .event-meta .neg { color: var(--red); }
  .event-meta .pos { color: var(--green); }

  .center {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    background: var(--bg);
    position: relative;
    overflow: hidden;
	padding-top: 24px;
  }

  .center::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(57,255,20,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(57,255,20,0.03) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }

  .character-wrap {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 20px;
	flex-direction: column;
  }
  
  .character-portrait {
    width: 100%;
    height: auto;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: #0a0a18;
    flex-shrink: 0;
    position: relative;
  }
  
  .character-portrait img {
    width: 100%;
    height: auto;
    object-fit: cover;
    display: block;
    transition: opacity 0.4s;
  }
  
  .character-right {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 4px;
  }
  
  #character {
    font-size: var(--font-x);
    display: block;
    filter: drop-shadow(0 0 20px rgba(57,255,20,0.3));
    transition: filter 0.5s;
    line-height: 1;
    animation: float 3s ease-in-out infinite;
  }
  

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .status-badge {
    font-family: 'VT323', monospace;
    font-size: var(--font-m);
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    margin-top: 4px;
  }

  .task-display {
    z-index: 2;
    width: 85%;
    max-width: 400px;
    text-align: center;
  }

  #currentTask {
    font-family: 'VT323', monospace;
    font-size: var(--font-l);
    color: var(--green);
    text-shadow: 0 0 10px rgba(57,255,20,0.5);
    margin-bottom: 10px;
    min-height: 28px;
    letter-spacing: 1px;
	xxxwhite-space: nowrap;
  }

  #progress-label {
    font-size: var(--font-s);
    color: var(--dim);
    text-align: left;
    margin-bottom: 4px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  #progress-main-bar {
    height: 22px;
    border: 1px solid var(--border);
    border-radius: 0;
    position: relative;
  }

  #taskProgress {
    background: linear-gradient(90deg, #008b00, var(--green));
    box-shadow: 0 0 8px rgba(57,255,20,0.4);
  }

  .corner-tag {
    position: absolute;
    font-family: 'VT323', monospace;
    font-size: var(--font-m);
    color: var(--dim);
    letter-spacing: 1px;
  }

  .corner-tag.tl { top: 8px; left: var(--font-m); }
  .corner-tag.tr { top: 8px; right: var(--font-m); }
  .corner-tag.bl { bottom: 8px; left: var(--font-m); }
  .corner-tag.br { bottom: 8px; right: var(--font-m); }

  .actions {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #0f0f1a;
    border-top: 2px solid var(--border);
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 8px 16px;
    height: 60px;
    align-items: center;
  }

  .actions button {
    font-family: 'VT323', monospace;
    font-size: var(--font-l);
    letter-spacing: 1px;
    padding: 6px 18px;
    border: 1px solid transparent;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
  }

  .actions button::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.08);
    opacity: 0;
    transition: opacity 0.1s;
  }

  .actions button:hover::after { opacity: 1; }
  .actions button:active { transform: scale(0.96); }

  .coffee    { background: #1a1000; color: var(--yellow); border-color: #554400 !important; }
  .coffee:hover    { background: #2a1a00; box-shadow: 0 0 12px rgba(255,230,0,0.3); }

  .refactor  { background: #001a0a; color: var(--green); border-color: #004422 !important; }
  .refactor:hover  { background: #002a10; box-shadow: 0 0 12px rgba(57,255,20,0.3); }

  .ignore    { background: #1a000a; color: var(--red); border-color: #440022 !important; }
  .ignore:hover    { background: #2a0010; box-shadow: 0 0 12px rgba(255,45,85,0.3); }

  .cazzeggio { background: #0a001a; color: var(--purple); border-color: #330055 !important; min-width: 36px; }
  .cazzeggio:hover { background: #150030; box-shadow: 0 0 12px rgba(199,125,255,0.3); }

  #clock  { font-family: 'VT323', monospace; font-size: var(--font-m); color: var(--dim); margin-left: auto; letter-spacing: 2px; }

  @keyframes flashGood { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 18px var(--flash-color)} }
  @keyframes flashBad  { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 18px var(--flash-color)} }

  /* charge: sale = bene (verde), scende = male (rosso) */
  .charge-flash-up   { --flash-color:#39ff14; animation: flashGood 0.5s ease; }
  .charge-flash-down { --flash-color:#ff2d55; animation: flashBad  0.5s ease; }

  /* stress: sale = male (rosso), scende = bene (verde) */
  .stress-flash-up   { --flash-color:#ff2d55; animation: flashBad  0.5s ease; }
  .stress-flash-down { --flash-color:#39ff14; animation: flashGood 0.5s ease; }

  /* quality: sale = bene (verde), scende = male (rosso) */
  .quality-flash-up   { --flash-color:#39ff14; animation: flashGood 0.5s ease; }
  .quality-flash-down { --flash-color:#ff2d55; animation: flashBad  0.5s ease; }

  #gameOverScreen {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 10000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }

  #gameOverScreen.show { display: flex; }

  #gameOverMsg {
    font-family: 'VT323', monospace;
    font-size: var(--font-x);
    color: var(--red);
    text-shadow: 0 0 30px var(--red);
    text-align: center;
    animation: glitch 0.3s infinite;
    line-height: 1.2;
  }

  #gameOverSub {
    font-family: 'VT323', monospace;
    color: var(--dim);
    font-size: var(--font-l);
    text-align: center;
  }

  @keyframes glitch {
    0%   { text-shadow: 0 0 30px var(--red); transform: none; }
    20%  { text-shadow: 3px 0 0 cyan, -3px 0 0 var(--red); transform: skewX(2deg); }
    40%  { text-shadow: -3px 0 0 cyan, 3px 0 0 var(--red); transform: skewX(-2deg); }
    60%  { text-shadow: 0 0 30px var(--red); transform: none; }
    100% { text-shadow: 0 0 30px var(--red); transform: none; }
  }

  #restartBtn {
    font-family: 'VT323', monospace;
    font-size: var(--font-l);
    padding: 10px 30px;
    background: transparent;
    border: 2px solid var(--green);
    color: var(--green);
    cursor: pointer;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  #restartBtn:hover {
    background: var(--green);
    color: var(--bg);
    box-shadow: 0 0 20px var(--green);
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  
  /* ── UNICO OVERLAY SCANLINES ── */
  #scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.2) 2px,
      rgba(0,0,0,0.2) 4px
    );
    pointer-events: none;
    z-index: 10001;
  }
  
  
  
 
/* MOBILE FIX */
@media (max-width: 900px) {

  body {
    overflow: auto;
  }

  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    height: auto;
  }

  /* TASK (sinistra) */
  .panel {
    grid-column: 1;
    grid-row: 1;
    height: 220px;
    border-right: 1px solid var(--border);
    border-left: none;
  }

  /* EVENTI (destra) */
  .panel.right {
    grid-column: 2;
    grid-row: 1;
    height: 220px;
    border-left: 1px solid var(--border);
  }

  /* CENTER sotto */
  .center {
    grid-column: 1 / -1;
    grid-row: 2;
    padding: 16px;
  }

  /* importantissimo per evitare overflow nelle grid */
  .panel, .panel.right {
    min-width: 0;
  }

  /* scroll interno */
  .panel-scroll {
    overflow-y: auto;
  }

  /* TOPBAR */
  .topbar {
    flex-direction: column;
    height: auto;
    gap: 10px;
    padding: 10px;
  }

  .bars-area {
    flex-direction: column;
    width: 100%;
    gap: 8px;
  }

  .bar label {
    min-width: 170px;
    text-align: left;
  }

  /* BOTTONI */
  .actions {
    flex-wrap: wrap;
    height: auto;
    padding: 10px;
  }

  .actions button {
    flex: 1 1 45%;
    font-size: 14px;
    padding: 10px;
  }

  /* PERSONAGGIO */
  #character {
    font-size: 36px;
  }

  .task-display {
    width: 100%;
  }
}





#modalOverlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.82);
  z-index: 9500;
  align-items: center;
  justify-content: center;
  animation: modalFadeIn 0.2s ease;
}
#modalOverlay.show { display: flex; }

@keyframes modalFadeIn {
  from { opacity: 0; } to { opacity: 1; }
}

.modal-box {
  background: #0d0d1e;
  border: 2px solid var(--yellow);
  border-top: 4px solid var(--yellow);
  box-shadow: 0 0 40px rgba(255,230,0,0.25);
  max-width: 420px;
  width: 90%;
  border-radius: 2px;
  overflow: hidden;
  animation: modalSlideIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes modalSlideIn {
  from { transform: translateY(-30px) scale(0.95); opacity: 0; }
  to   { transform: translateY(0)     scale(1);    opacity: 1; }
}

.modal-img-wrap {
  width: 100%;
  max-height: 200px;
  overflow: hidden;
  background: #0a0a18;
  border-bottom: 1px solid #3a3a00;
  padding: 4px;
}

.modal-img-wrap img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  display: block;
}

.modal-pause-badge, .modal-title-badge {
  font-family: 'VT323', monospace;
  font-size: var(--font-m);
  color: var(--orange);
  border-bottom: 1px solid #3a3a00;
  padding: 4px 12px;
  letter-spacing: 2px;
  background: #14140a;
}

.modal-pause-badge {
  text-align: right;
  animation: blink 1s infinite;
}

.modal-event-name {
  font-family: 'VT323', monospace;
  font-size: 22px;
  color: var(--yellow);
  padding: 14px 16px 10px;
  line-height: 1.3;
  letter-spacing: 1px;
  border-bottom: 1px solid #1a1a00;
}

.modal-choices {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.modal-choice-btn {
  font-family: 'VT323', monospace;
  font-size: var(--font-l);
  letter-spacing: 1px;
  border: none;
  border-top: 1px solid #1a1a00;
  padding: 12px 16px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  background: transparent;
  width: 100%;
}

.modal-btn-1 { color: var(--white); }
.modal-btn-1:hover { color: var(--green);}

.modal-btn-2 { color: var(--white); }
.modal-btn-2:hover { color: var(--red);}

.modal-choice-btn:active { opacity: 0.8; }


.modal-choice-effects {
  display: block;
  font-family: 'VT323', monospace;
  font-size: var(--font-s);
  letter-spacing: 1px;
  text-align: right;
  opacity: 0.8;
}

</style>
</head>
<body>

<div id="scanlines"></div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-title">
    IL PROGRAMMATORE TIPICO™ <span>v0.9.2-HOTFIX</span>
  </div>

  <div class="bars-area">
    <div class="bar">

// ── Helpers flash barra ──
function flashBar(id, dir) {
  const wrap = document.getElementById(id + 'BarWrap');
  const cls  = dir > 0 ? id+'-flash-up' : id+'-flash-down';
  wrap.classList.remove(id+'-flash-up', id+'-flash-down');
  void wrap.offsetWidth; //reflow per restart animation
  wrap.classList.add(cls);
  setTimeout(() => wrap.classList.remove(cls), 1000);
}

function spawnTask() {
  const activeNames = new Set(state.tasks.map(t => t.name));
  if (state.currentTask) activeNames.add(state.currentTask.name);
  const available = TASKS.filter(t => !activeNames.has(t.name));
  if (available.length === 0) return;
  const t = available[Math.floor(Math.random() * available.length)];
  //const t = TASKS[Math.floor(Math.random() * TASKS.length)];
  const ttl = 5000 + Math.random() * 5000;
  const id = Date.now() + Math.random();
  state.taskTTLMax[id] = ttl;
  state.tasks.push({ ...t, id, progress: 0, ttl });
}

function triggerEvent() {
  const activeNames = new Set(state.events.map(e => e.name));
  const available = EVENTS.filter(e => !activeNames.has(e.name));
  if (available.length === 0) return;
  const e = available[Math.floor(Math.random() * available.length)];
  //const e = EVENTS[Math.floor(Math.random() * EVENTS.length)];
  state.stress  += e.stress;
  state.quality += e.quality;
  flashBar('quality', e.quality);
  flashBar('stress',  e.stress);
  state.events.unshift({ ...e, expires: Date.now() + 8000 });
  if (state.events.length > 3) state.events.pop();
}

function startTask(task) {
  if (state.currentTask) return;
  state.currentTask = task;
  state.tasks = state.tasks.filter(t => t.id !== task.id);
}

function updateTasks(delta) {
  if (state.currentTask) {
    state.currentTask.progress += delta;
    if (state.currentTask.progress >= state.currentTask.duration) {
	  //task completato
      state.stress        += state.currentTask.stress;
      state.quality       += state.currentTask.quality;
      state.chargeability += 5;
      flashBar('quality', 1);
      flashBar('stress', -1);
      flashBar('charge', 1);
      state.currentTask = null;
    }
  }

  const expired = state.tasks.filter(t => t.ttl - delta <= 0);
  expired.forEach(t => {
    state.stress        += 10;
    state.quality       -= 5;
    state.chargeability -= 15;
    flashBar('quality', -1);
    flashBar('stress', +1);
    flashBar('charge', -1);
    delete state.taskTTLMax[t.id];
  });
  state.tasks = state.tasks
    .map(t => ({ ...t, ttl: t.ttl - delta }))
    .filter(t => t.ttl > 0);
}

function coffee()    { state.stress -= 10; flashBar('stress', -1); }
function refactor()  { state.quality += 10; flashBar('quality', +1); }
function ignore()    { state.stress -= 5; state.quality -= 5; flashBar('stress', -1); flashBar('quality', -1); }
function cazzeggio() { state.stress -= 15; state.quality -= 15; state.chargeability -= 15; flashBar('stress', -1); flashBar('quality', -1); flashBar('charge', -1); }

function clamp() {
  state.stress        = Math.max(0, Math.min(100, state.stress));
  state.quality       = Math.max(0, Math.min(100, state.quality));
  state.chargeability = Math.max(0, Math.min(100, state.chargeability));
}

function checkGameOver() {
  //stressa a 100 -> morto
  if (state.stress >= 100) {
    document.getElementById('gameOverMsg').innerText = '💀 SEI MORTO DI STRESS';
    document.getElementById('gameOverSub').innerText = 'Lo sapevi che era una settimana corta?';
    document.getElementById('gameOverScreen').classList.add('show');
    state.gameOver = true;
  }
  //quality a zero -> licenziato
  if (state.quality <= 0) {
    document.getElementById('gameOverMsg').innerText = '🐛 LICENZIATO IN TRONCO';
    document.getElementById('gameOverSub').innerText = 'Troppi bug in produzione... come sempre!';
    document.getElementById('gameOverScreen').classList.add('show');
    state.gameOver = true;
  }
  //charge a zero -> licenziato
  if (state.chargeability <= 0) {
    document.getElementById('gameOverMsg').innerText = '🛋️ LICENZIATO IN TRONCO';
    document.getElementById('gameOverSub').innerText = 'Nullafacente, hai esagerato con il cazzeggio!';
    document.getElementById('gameOverScreen').classList.add('show');
    state.gameOver = true;
  }
}

function updateClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  const clockEl = document.getElementById('clock');
  if (clockEl) clockEl.innerText = `${hh}:${mm}:${ss}`;
}

// ── Render task card DOM node (riusato per evitare innerHTML su lista) ──
function renderTaskNode(t) {
  const el = document.createElement('div');
  el.className = 'task' + (t.ttl < 3000 ? ' urgent' : '');
  const seconds  = Math.max(0, Math.floor(t.ttl / 1000));
  const duration = Math.floor(t.duration / 1000);
  const maxTTL   = state.taskTTLMax[t.id] || 10000;
  const ttlPerc  = Math.max(0, (t.ttl / maxTTL) * 100);
  const ttlClass = t.ttl < 3000 ? 'low' : '';
  const ttlColor = t.ttl < 3000 ? '#ff2d55' : t.ttl < 6000 ? '#ff8c00' : '#39ff14';

  el.innerHTML =
    buildBanner(t.image, false) +
    `<div class="task-body">
      <div class="task-name">${t.name}</div>
      <div class="task-meta">
        <span class="ttl ${ttlClass}">⏱ ~${duration}h</span>
        <span class="ttl ${ttlClass}">⚠ ${seconds}s</span>
      </div>
      <div class="ttl-bar">
        <div class="ttl-fill" style="width:${ttlPerc}%;background:${ttlColor}"></div>
      </div>
    </div>`;

  el.onmousedown = () => startTask(t);
  return el;
}


//MODAL Popup
function showModal(ev) {
  const wrap = document.getElementById('modalImg').parentElement;
  wrap.style.display = '';                                        //ripristina
  document.getElementById('modalImg').src               = IMG_BASE + ev.image;
  document.getElementById('modalEventName').textContent = ev.name;
  document.querySelector('.modal-btn-1').innerHTML = ev.btn1.label + '<span class="modal-choice-effects">' + fmtEffects(ev.btn1) + '</span>';
  document.querySelector('.modal-btn-2').innerHTML = ev.btn2.label + '<span class="modal-choice-effects">' + fmtEffects(ev.btn2) + '</span>';
  document.getElementById('modalOverlay').classList.add('show');
}

function resolveModal(choice) {
  const ev    = state.modalEvent;
  if (!ev) return;
  const delta = ev[choice]; // ev.btn1 o ev.btn2
  if (delta.stress  !== undefined) { state.stress        += delta.stress;  flashBar('stress',  delta.stress);  }
  if (delta.quality !== undefined) { state.quality       += delta.quality; flashBar('quality', delta.quality); }
  if (delta.charge  !== undefined) { state.chargeability += delta.charge;  flashBar('charge',  delta.charge);  }
  state.modalEvent = null;
  document.getElementById('modalOverlay').classList.remove('show');
  clamp();
  checkGameOver();
}

function fmtEffects(delta) {
  const parts = [];
  if (delta.stress  !== undefined) parts.push('STRESS: '  + (delta.stress  > 0 ? '+' : '') + delta.stress);
  if (delta.charge  !== undefined) parts.push('CHARGE: '  + (delta.charge  > 0 ? '+' : '') + delta.charge);
  if (delta.quality !== undefined) parts.push('QUALITÀ: ' + (delta.quality > 0 ? '+' : '') + delta.quality);
  return parts.join(' · ');
}

function triggerModalEvent() {
  if (state.modalEvent) return;
  const available = MODAL_EVENTS.filter(e => !state.modalUsed.has(e.name));
  if (available.length === 0) return;
  const ev = available[Math.floor(Math.random() * available.length)];
  state.modalUsed.add(ev.name);
  state.modalEvent = ev;
  showModal(ev);
}



function render() {
  // ── CHARGEABILITY BAR ──
  const ch = state.chargeability;
  const cf = document.getElementById('chargeFill');
  if (cf) {
	  cf.style.width      = ch + '%';
	  cf.style.background = ch > 25 ? '#00cfff' : '#ff2d55';
	  cf.style.boxShadow  = ch <= 25 ? '0 0 8px #ff2d55' : 'none';
  }
  const cv = document.getElementById('chargeVal');
  if (cv) {
	cv.innerText = Math.round(ch);
  }

  // ── STRESS BAR ──
  const sf = document.getElementById('stressFill');
  if (sf) {
	sf.style.width      = state.stress + '%';
	sf.style.background = state.stress < 25 ? '#39ff14' : '#ff2d55';
	sf.style.boxShadow  = state.stress >= 75 ? '0 0 8px #ff2d55' : 'none';
  }
  const sv = document.getElementById('stressVal');
  if (sv) {
	sv.innerText = Math.round(state.stress);
  }

  // ── QUALITY BAR ──
  const qf = document.getElementById('qualityFill');
  if (qf) {
	qf.style.width      = state.quality + '%';
	qf.style.background = state.quality > 25 ? '#39ff14' : '#ff2d55';
	qf.style.boxShadow  = state.quality <= 25 ? '0 0 8px #ff2d55' : 'none';
  }
  const qv = document.getElementById('qualityVal');
  if (qv) {
	qv.innerText = Math.round(state.quality);
  }

  // ── CURRENT TASK ──
  const currentTaskEl = document.getElementById('currentTask');
  const progressEl    = document.getElementById('taskProgress');
  const lab 		  = document.getElementById('progress-label');
  const prg           = document.getElementById('progress-main-bar');
  if (state.currentTask) {
    currentTaskEl.innerText = '▸ ' + state.currentTask.name;
    progressEl.style.width  = ((state.currentTask.progress / state.currentTask.duration) * 100) + '%';
	lab.style.visibility    = 'visible';
	prg.style.visibility    = 'visible';
  } else {
    currentTaskEl.innerText = 'Sono scarico...';
	progressEl.style.width  = '0%';
	lab.style.visibility    = 'hidden';
	prg.style.visibility    = 'hidden';
  }

  // ── TASK LIST ──
  const taskList = document.getElementById('taskList');
  // Rebuild solo se il numero di task è cambiato o se i TTL ids sono diversi
  const currentIds = Array.from(taskList.querySelectorAll('.task')).map(el => el.dataset.id);
  const newIds     = state.tasks.map(t => String(t.id));
  if (JSON.stringify(currentIds) !== JSON.stringify(newIds)) {
    while (taskList.firstChild) taskList.removeChild(taskList.firstChild);
    state.tasks.forEach(t => {
      const node = renderTaskNode(t);
      node.dataset.id = String(t.id);
      taskList.appendChild(node);
    });
  } else {
    // Aggiorna solo TTL bar e classi urgenza senza rifare il banner
    const taskEls = taskList.querySelectorAll('.task');
    state.tasks.forEach((t, i) => {
      const el = taskEls[i];
      if (!el) return;
      const isUrgent = t.ttl < 3000;
      el.classList.toggle('urgent', isUrgent);
      const seconds   = Math.max(0, Math.floor(t.ttl / 1000));
      const maxTTL    = state.taskTTLMax[t.id] || 10000;
      const ttlPerc   = Math.max(0, (t.ttl / maxTTL) * 100);
      const ttlColor  = t.ttl < 3000 ? '#ff2d55' : t.ttl < 6000 ? '#ff8c00' : '#39ff14';
      const ttlClass  = isUrgent ? 'low' : '';
      const ttlSpans  = el.querySelectorAll('.ttl');
      if (ttlSpans[1]) ttlSpans[1].innerText = `⚠ ${seconds}s`;
      if (ttlSpans[0]) ttlSpans[0].className = `ttl ${ttlClass}`;
      if (ttlSpans[1]) ttlSpans[1].className = `ttl ${ttlClass}`;
      const ttlFill = el.querySelector('.ttl-fill');
      if (ttlFill) { ttlFill.style.width = ttlPerc + '%'; ttlFill.style.background = ttlColor; }
      // Aggiorna gradient overlay urgente
      const bannerBefore = el.querySelector('.card-banner-wrap');
      if (bannerBefore) {
        bannerBefore.style.setProperty('--banner-fade', isUrgent ? '#1f0a0a' : '#12121f');
      }
    });
  }

  // ── EVENT LIST ──
  const eventList = document.getElementById('eventList');
  const newHtml = state.events.map(e => {
    const isBonus = e.stress < 0 || e.quality > 0;
    return `<div class="event${isBonus ? ' bonus' : ''}" style="${isBonus ? 'border-left-color:#39ff14;background:#0a1a0a;border-color:#0a2a0a' : ''}">
      ${buildBanner(e.image, isBonus)}
      <div class="event-body">
        <div class="event-name">${isBonus ? '✦' : '⚡'} ${e.name}</div>
        <div class="event-meta">
          <span class="${e.stress  > 0 ? 'neg' : 'pos'}">STRESS ${e.stress  > 0 ? '+' : ''}${e.stress}</span>
          <span class="${e.quality < 0 ? 'neg' : 'pos'}">QUALITÀ ${e.quality > 0 ? '+' : ''}${e.quality}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  // Aggiorna il DOM solo se il contenuto è effettivamente diverso
  if (eventList && eventList.innerHTML !== newHtml) eventList.innerHTML = newHtml;

  
  // ── CHARACTER ──
  const char      = document.getElementById('character');
  const badge     = document.getElementById('statusBadge');
  const charImg   = document.getElementById('characterImg');
  
  for (const c of CHARACTERS) {
	if (state.stress < c.threshold) {
	  if (char) {
		char.innerText      = c.emoji;
		char.style.filter   = state.stress > 70 ? 'drop-shadow(0 0 20px rgba(255,45,85,0.5))' : 'drop-shadow(0 0 20px rgba(57,255,20,0.3))';
	  }
	  
	  if (badge) {
		badge.innerText     = c.status;
	  }
	  
	  if (charImg && charImg.dataset && charImg.dataset.current !== c.image) {
		charImg.dataset.current = c.image;
		charImg.style.display   = 'block';
		charImg.src             = IMG_BASE + c.image;
	  }
	  break;
	}
  }
}

let last = 0;
let lastRender = 0;

setInterval(updateClock, 1000);
updateClock();

function loop(ts) {
  if (state.gameOver) return;
  const raw   = ts - last;
  last        = ts;

  const delta = state.modalEvent ? 0 : raw;  // pausa TTL se modale aperto

  updateTasks(delta);
  state.events = state.events.filter(e => Date.now() < e.expires);

  if (!state.modalEvent) {
    if (Math.random() < 0.003 && state.tasks.length < 3) spawnTask();
    if (Math.random() < 0.003 && state.events.length < 2) triggerEvent();
    if (Math.random() < 0.0005) triggerModalEvent();  //trigger modal popup
  }

  clamp();
  checkGameOver();

  if (ts - lastRender > 250) {
    render();
    lastRender = ts;
  }
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
